name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:       # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Overview (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: Vidhey012
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          filename: generated/overview-light.svg
          config_display: large

      - name: Generate Overview (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: Vidhey012
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          filename: generated/overview-dark.svg
          config_display: large
          config_theme: dark

      - name: Generate Languages (Light)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: Vidhey012
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          config_timezone: Asia/Kolkata
          filename: generated/languages-light.svg

      - name: Generate Languages (Dark)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: Vidhey012
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          config_timezone: Asia/Kolkata
          filename: generated/languages-dark.svg
          config_theme: dark
